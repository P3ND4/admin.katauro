<div class="dashboard">
    <div class="navigation">
        <div class="nav-items-container">
            <header class="nav-header">
                <img src="K.png" alt="katauro logo" class="logo">
            </header>
            <div class="nav-items">
                <div class="nav-item products" [ngClass]="{'active': isRoute('/dashboard/products')}"
                    (click)="navigate('/dashboard/products')">
                    <div class="nav-icon" src="luminarias.svg" alt=""></div>
                </div>
                <div class="nav-item users" [routerLink]="'/dashboard/users'"
                    [ngClass]="{'active': isRoute('/dashboard/users')}">
                    <div class="nav-icon" src="users.svg" alt=""></div>
                </div>
                <div class="nav-item promotions" [routerLink]="'/dashboard/promotions'"
                    [ngClass]="{'active': isRoute('/dashboard/promotions')}">
                    <div class="nav-icon" src="tag.svg" alt=""></div>
                </div>
                <div class="nav-item orders" [routerLink]="'/dashboard/orders'"
                    [ngClass]="{'active': isRoute('/dashboard/orders')}">
                    <div class="nav-icon" src="layout.svg" alt=""></div>
                </div>
                <div class="nav-item blogs" [routerLink]="'/dashboard/blogs'"
                    [ngClass]="{'active': isRoute('/dashboard/blogs')}">
                    <div class="nav-icon" alt=""></div>
                </div>
            </div>
        </div>

    </div>

    <div class="route">
        <router-outlet></router-outlet>
    </div>

</div>
