<div class="main">
    <div class="content">
        <h2>Agregar Bloque</h2>
        <div class="type">
            <div class="option" (click)="addBlock('text')">
                <div class="icon">
                    <img src="type.svg" alt="">
                </div>
                <div class="text">
                    <h3>Texto</h3>
                    <p>Párrafo con formato</p>
                </div>
            </div>
            <div class="option" (click)="addBlock('image')">
                <div class="icon">
                    <img src="image.svg" alt="">
                </div>
                <div class="text">
                    <h3>Imagen</h3>
                    <p>Inserta una imagen</p>
                </div>
            </div>
        </div>
    </div>

</div>
